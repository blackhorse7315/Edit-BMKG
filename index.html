<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyOps Editor Pro</title>
    
    <!-- Meta untuk PWA & Favicon -->
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1UN9aTnhlhcgseGewqyLhWgylYVKiipwT">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1UN9aTnhlhcgseGewqyLhWgylYVKiipwT">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        :root {
            color-scheme: dark; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
        }

        #canvas-container { 
            max-width: 100%; 
            overflow: auto; 
            border: 2px solid #334155; 
            border-radius: 1rem;
            background: #000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        canvas { display: block; margin: 0 auto; }

        /* Input styling */
        .input-group { 
            background-color: #1e293b !important;
            border: 1px solid #334155 !important;
            border-radius: 0.75rem;
            padding: 0.75rem;
            color: #ffffff !important;
            width: 100%;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1) brightness(0.8);
            cursor: pointer;
        }

        /* Tombol Unduh yang disesuaikan dengan gaya tombol file picker */
        .download-btn-modern {
            @apply flex items-center justify-center gap-3 px-5 py-2.5 rounded-xl font-bold text-white transition-all duration-300;
            background-color: #2563eb; /* Blue 600 */
            font-size: 0.75rem; /* text-xs */
        }

        .download-btn-modern:hover {
            @apply bg-blue-700;
        }

        .download-btn-modern:active {
            transform: scale(0.97);
        }

        .logo-container {
            width: 90px;
            height: 90px;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1.5rem;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        select.input-group option {
            background-color: #1e293b;
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col items-center text-center">
            <div class="logo-container">
                <img src="https://lh3.googleusercontent.com/d/1UN9aTnhlhcgseGewqyLhWgylYVKiipwT" 
                     alt="Logo" 
                     class="w-full h-full object-contain"
                     crossorigin="anonymous">
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">Satelit Editor <span class="text-blue-500">Pro</span></h1>
            <p class="text-slate-400 text-sm max-w-md">Solusi profesional untuk pembaruan informasi visual pada citra satelit cuaca secara instan.</p>
            
            <button id="installBtn" class="mt-5 hidden bg-white/10 hover:bg-white/20 backdrop-blur-md text-white text-xs px-5 py-2.5 rounded-full font-bold border border-white/10 transition-all">
                ✚ Pasang Aplikasi
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- Sidebar Controls -->
            <div class="lg:col-span-4 bg-slate-800/50 backdrop-blur-xl p-7 rounded-2xl shadow-2xl border border-slate-700/50 space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-blue-400 mb-3">1. Berkas Citra</label>
                    <input type="file" id="imageInput" accept="image/*" 
                        class="block w-full text-xs text-slate-400 file:mr-4 file:py-2.5 file:px-5 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer transition-all">
                </div>

                <div class="space-y-5 pt-6 border-t border-slate-700/50">
                    <label class="block text-xs font-bold uppercase tracking-widest text-blue-400">2. Konfigurasi Header</label>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="setPreset('EH')" class="bg-slate-700/50 hover:bg-blue-600 py-2.5 rounded-xl text-[10px] font-bold tracking-widest transition-all border border-white/5">PRESET EH</button>
                        <button onclick="setPreset('IW')" class="bg-slate-700/50 hover:bg-blue-600 py-2.5 rounded-xl text-[10px] font-bold tracking-widest transition-all border border-white/5">PRESET IW</button>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">Identitas Satelit</label>
                        <input type="text" id="satName" value="HIMAWARI-9 EH" class="input-group">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">Tanggal</label>
                            <input type="date" id="satDate" class="input-group">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">Waktu (UTC)</label>
                            <input type="time" id="satTime" class="input-group">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-1.5">Palet Warna Teks</label>
                        <select id="textColor" class="input-group">
                            <option value="white">Putih Bersih</option>
                            <option value="#ffffa8">Kuning Muda (Lembut)</option>
                            <option value="#fdf863">Kuning Vektor (Cerah)</option>
                            <option value="#FFDD44">Kuning Emas (BMKG)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] uppercase font-bold tracking-widest text-slate-500 mb-2 flex justify-between">
                            Ketebalan Latar <span>(Adjust)</span>
                        </label>
                        <input type="range" id="headerHeightAdj" min="40" max="100" value="65" class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                </div>

                <div class="pt-4">
                    <button id="downloadBtn" class="download-btn-modern w-full hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        SIMPAN CITRA
                    </button>
                </div>
            </div>

            <!-- Preview Area -->
            <div class="lg:col-span-8">
                <div class="bg-slate-800/30 backdrop-blur-md p-5 rounded-2xl border border-slate-700/50 shadow-2xl">
                    <div class="flex justify-between items-center mb-5">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                            <h2 class="text-xs font-bold text-slate-300 uppercase tracking-widest">Kanvas Preview</h2>
                        </div>
                        <span id="status" class="text-[10px] font-black uppercase tracking-widest bg-blue-500/10 text-blue-400 border border-blue-500/20 px-4 py-1.5 rounded-full">Standby</span>
                    </div>
                    <div id="canvas-container">
                        <canvas id="editorCanvas"></canvas>
                    </div>
                    <p class="text-center text-[10px] text-slate-500 mt-4 italic">Gunakan kursor/sentuhan untuk menggeser preview jika ukuran gambar besar.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusLabel = document.getElementById('status');

        const satNameInput = document.getElementById('satName');
        const satDateInput = document.getElementById('satDate');
        const satTimeInput = document.getElementById('satTime');
        const textColorInput = document.getElementById('textColor');
        const headerHeightAdj = document.getElementById('headerHeightAdj');

        let originalImage = null;

        const today = new Date();
        satDateInput.value = today.toISOString().split('T')[0];
        satTimeInput.value = "14:40";

        function setPreset(type) {
            if(type === 'EH') {
                satNameInput.value = "HIMAWARI-9 EH";
                textColorInput.value = "white";
            } else {
                satNameInput.value = "HIMAWARI-9 IW";
                textColorInput.value = "#ffffa8"; 
            }
            if (originalImage) processImage();
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    processImage();
                    downloadBtn.classList.remove('hidden');
                    statusLabel.innerText = "Selesai";
                    statusLabel.className = "text-[10px] font-black uppercase tracking-widest bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-4 py-1.5 rounded-full";
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        [satNameInput, satDateInput, satTimeInput, textColorInput, headerHeightAdj].forEach(input => {
            input.addEventListener('input', () => {
                if (originalImage) processImage();
            });
        });

        function processImage() {
            if (!originalImage) return;

            canvas.width = originalImage.width;
            canvas.height = originalImage.height;

            ctx.drawImage(originalImage, 0, 0);

            const hFactor = headerHeightAdj.value / 1000; 
            const h = Math.round(canvas.height * hFactor);
            const w = Math.round(canvas.width * 0.65);

            // Patching tekstur
            const patchSourceY = Math.round(canvas.height * 0.20); 
            ctx.drawImage(originalImage, 0, patchSourceY, w, h, 0, 0, w, h);

            // Overlay Hitam 55%
            ctx.fillStyle = "rgba(0, 0, 0, 0.55)"; 
            ctx.fillRect(0, 0, w, h);

            // Formulasi Teks
            const d = satDateInput.value.split('-');
            const fDate = d.length === 3 ? `${d[2]}/${d[1]}/${d[0]}` : '';
            // Perubahan: Hilangkan spasi sebelum UTC agar rapat
            const txt = `${satNameInput.value} ${fDate} ${satTimeInput.value}UTC`;

            const fSize = Math.round(canvas.height * 0.038);
            ctx.font = `bold ${fSize}px Arial, Helvetica, sans-serif`;
            ctx.fillStyle = textColorInput.value; 
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";

            const mx = Math.round(canvas.width * 0.015);
            ctx.fillText(txt, mx, h / 2);
        }

        downloadBtn.addEventListener('click', function() {
            const link = document.createElement('a');
            const dStr = satDateInput.value.replace(/-/g, '');
            const tStr = satTimeInput.value.replace(/:/g, '');
            link.download = `Satelit_Editor_${dStr}_${tStr}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

        // PWA Setup
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                installBtn.classList.add('hidden');
            }
        });

        const manifest = {
            "name": "Satelit Editor Pro",
            "short_name": "SatEditor",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#0f172a",
            "icons": [
                {
                    "src": "https://lh3.googleusercontent.com/d/1UN9aTnhlhcgseGewqyLhWgylYVKiipwT",
                    "sizes": "512x512",
                    "type": "image/png"
                }
            ]
        };
        const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
    </script>
</body>
</html>
